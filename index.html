<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Novedades</title>
</head>
<body>

<h2>Registro de Novedad</h2>

<input id="legajo" placeholder="Legajo"><br><br>

<select id="tipo">
<option value="">Tipo</option>
<option value="Cambio horario">Cambio horario</option>
<option value="Cambio franco">Cambio franco</option>
<option value="Fichada manual">Fichada manual</option>
<option value="Retiro anticipado">Retiro anticipado</option>
</select><br><br>

<input type="date" id="fecha"><br><br>
<input type="time" id="hora"><br><br>

<button onclick="enviar()">Enviar</button>

<p id="msg"></p>

<script>
const URL_SCRIPT = "PEGÁ_ACÁ_TU_URL";

async function enviar(){

const datos = {
legajo: document.getElementById("legajo").value,
tipo: document.getElementById("tipo").value,
fecha: document.getElementById("fecha").value,
hora: document.getElementById("hora").value
};

const res = await fetch(URL_SCRIPT,{
method:"POST",
body: JSON.stringify(datos)
});

const r = await res.json();

if(r.ok)
document.getElementById("msg").innerText="Registro guardado para "+r.nombre;
else
document.getElementById("msg").innerText=r.error;
}
</script>

</body>
</html>
